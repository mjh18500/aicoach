<style>
:root {
  --cream:#faf8f4;--w2:#f5f2ec;--s50:#fafaf9;--s100:#f3f0ea;--s200:#e8e3d9;
  --s300:#d4cdc0;--s400:#a89f92;--s500:#7a7168;--s600:#5c5650;--s800:#2d2a26;
  --g100:#e8f0e9;--g200:#c8deca;--g300:#9dc4a0;--g400:#6ea872;--g500:#4d8c52;--g600:#3a6b3e;
  --blush:#f5e6e0;--bd:#c9897a;--sky:#e0eef5;--skd:#5a9ab5;--amb:#fef3e2;--amd:#c98a2e;
  --sh1:0 1px 3px rgba(45,42,38,.06),0 1px 2px rgba(45,42,38,.04);
  --sh2:0 4px 16px rgba(45,42,38,.08),0 2px 6px rgba(45,42,38,.05);
  --sh3:0 12px 40px rgba(45,42,38,.12),0 4px 12px rgba(45,42,38,.06);
  --r:20px;--rs:12px;--rxs:8px;
  --rose:#fdf2f2;--rose-b:#f5d0d0;--rose-d:#b85c5c;--rose-t:#7a3333;
}

/* ── REJECTION TOAST ── */
@keyframes slideDown{from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideUp{from{opacity:1;transform:translateY(0);}to{opacity:0;transform:translateY(-20px);}}
.toast{
  position:absolute;top:58px;left:12px;right:12px;z-index:200;
  background:white;border:1px solid var(--rose-b);border-left:4px solid var(--rose-d);
  /* Lines 27-30 omitted */
}
.toast.hiding{animation:cardShift .5s ease both;}
.toast-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
.toast-body{flex:1;}
.toast-title{font-size:12px;font-weight:700;color:var(--rose-d);margin-bottom:2px;}
.toast-msg{font-size:12px;color:var(--s500);line-height:1.4;}
.toast-close{font-size:14px;color:var(--s300);cursor:pointer;flex-shrink:0;padding:0 2px;line-height:1;}
.toast-close:hover{color:var(--s500);}
.toast-actions{display:flex;gap:7px;margin-top:8px;}
.toast-btn{font-size:11px;font-weight:600;padding:5px 12px;border-radius:20px;cursor:pointer;transition:all .2s;}
.toast-btn-primary{background:var(--rose-d);color:white;}
.toast-btn-primary:hover{background:var(--rose-t);}
.toast-btn-secondary{background:var(--s100);color:var(--s600);}
.toast-btn-secondary:hover{background:var(--s200);}

/* ── REJECTION CARD STATES ── */
@keyframes cardShift{0%{transform:scale(1);opacity:1;}40%{transform:scale(.97);opacity:.7;}100%{transform:scale(1);opacity:1;}}
.jcard.rejecting{animation:cardShift .5s ease both;}
.jcard.rejected{border-color:var(--rose-b) !important;background:var(--rose) !important;}
.jcard.rejected .jro{color:var(--rose-d);}
.jcard.rejected .jco{color:#c08080;}
.rej-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;background:var(--rose);color:var(--rose-d);border:1px solid var(--rose-b);}
.rej-note{background:white;border:1px solid var(--rose-b);border-radius:var(--rxs);padding:9px 11px;margin-top:9px;font-size:12px;color:var(--rose-d);display:flex;gap:7px;align-items:flex-start;line-height:1.45;}
.rej-strikethrough{text-decoration:line-through;opacity:.5;}

/* ── REJECTED COLUMN ── */
.col-rejected{margin-top:6px;}
.rej-empty{font-size:12px;color:var(--s300);text-align:center;padding:14px;font-style:italic;}

/* ── DETECT BUTTON ── */
.detect-bar{/* Lines 61-66 omitted */}
.detect-bar:hover{border-color:var(--rose-d);background:linear-gradient(135deg,var(--rose),#fde8e8);}
.detect-bar-icon{font-size:20px;flex-shrink:0;}
.detect-bar-txt strong{font-size:13px;font-weight:600;color:var(--rose-d);display:block;}
.detect-bar-txt span{font-size:11px;color:#c08080;}
.detect-bar-arrow{margin-left:auto;font-size:16px;color:var(--rose-b);}

/* ── SAGE WELLBEING MSG ── */
.wellbeing-card{/* Lines 75-78 omitted */}
.wc-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.wc-header span{font-size:12px;font-weight:700;color:var(--g600);text-transform:uppercase;letter-spacing:.5px;}
.wc-body{font-size:13px;color:var(--s600);line-height:1.55;}
.wc-actions{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap;}
.wc-pill{font-size:11px;font-weight:600;padding:5px 12px;border-radius:20px;background:white;border:1px solid var(--g200);color:var(--g600);cursor:pointer;transition:all .2s;}
.wc-pill:hover{background:var(--g100);border-color:var(--g300);}
*{margin:0;padding:0;box-sizing:border-box;}
html{font-size:15px;}
body{background:#e8e4dc;font-family:'Outfit',sans-serif;color:var(--s800);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:32px 16px;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 900px 600px at 30% 20%,rgba(110,168,114,.1) 0%,transparent 60%),radial-gradient(ellipse 700px 500px at 80% 80%,rgba(197,143,119,.08) 0%,transparent 60%);z-index:-1;}

.shell{width:100%;max-width:400px;background:var(--cream);border-radius:40px;overflow:hidden;box-shadow:var(--sh3);position:relative;height:820px;display:flex;flex-direction:column;}
/* the rest omitted for brevity */
